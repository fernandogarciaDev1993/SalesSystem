<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Logout - Afeto no Pote</title>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body style="background: linear-gradient(135deg, #FDF8F5 0%, #F5EDE8 100%);">
    <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="text-center">
            <img src="images/logo.png" alt="Afeto no Pote" style="width: 100px;" />
            <h5 class="mt-3" style="color: #2C1810;">Sessao encerrada</h5>
            <p style="color: #8C7568;">Ate logo!</p>
            <a href="/login" class="btn px-4" style="background-color: #5C3D2E; color: #fff; border-radius: 0.5rem;">
                <i class="bi bi-box-arrow-in-right me-1"></i>Ir para Login
            </a>
        </div>
    </div>
    <script>
        sessionStorage.removeItem('auth_token');
        sessionStorage.removeItem('auth_userName');
        sessionStorage.removeItem('auth_userRole');
        sessionStorage.removeItem('auth_tenantId');
        sessionStorage.removeItem('auth_tenantSubdomain');
    </script>
</body>
</html>
